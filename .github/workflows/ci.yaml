name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # 任务 1: 测试
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      # 使用 Makefile 运行测试
      # test-ci 不使用 -cover，避免 Go 1.22 的 covdata 问题
      - name: Run Tests
        run: make test-ci


